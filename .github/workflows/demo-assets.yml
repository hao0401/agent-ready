name: Demo Assets

on:
  pull_request:
  push:
    branches: [main, master]

jobs:
  demo-assets:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: "3.x"
      - name: Install demo renderer
        run: python -m pip install Pillow
      - name: Rebuild demo assets
        run: python -B scripts/build_demo_assets.py --require-images
      - name: Verify public demo output
        run: python -B -c "from scripts.release_check import scan_public_paths; scan_public_paths()"
