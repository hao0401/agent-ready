name: Test

on:
  pull_request:
  push:
    branches: [main, master]

jobs:
  test:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: "3.x"
      - name: Compile
        run: python -B scripts/dev.py lint
      - name: Unit tests
        run: python -B scripts/dev.py test
      - name: Smoke check
        run: python -B agent-ready.py scan .
      - name: Module entry
        run: python -B -m agent_ready --help
